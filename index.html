  <div id="root"></div>
  <script type="text/babel">

const SB = {
green: "#00704A", darkGreen: "#1E3932", lightGreen: "#D4E9E2",
gold: "#CBA258", white: "#FFFFFF", cream: "#F2EFE8",
gray: "#747474", lightGray: "#EDEBE4", black: "#1E1E1E",
};

function generateSlots() {
const slots = [];
for (let h = 5; h < 20; h++) {
slots.push({ hour: h, min: 0 });
slots.push({ hour: h, min: 30 });
}
slots.push({ hour: 20, min: 0 });
return slots;
}

function fmtTime(h, m) {
const ampm = h < 12 ? "AM" : "PM";
const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
return h12 + ":" + (m === 0 ? "00" : "30") + " " + ampm;
}

function timeToDecimal(h, m) { return h + m / 60; }

function parseTimeInput(str) {
if (!str) return null;
str = str.trim().toLowerCase().replace(/\s+/g, "");
let ampm = null;
if (str.endsWith("am") || str.endsWith("a")) { ampm = "am"; str = str.replace(/(am|a)$/, ""); }
else if (str.endsWith("pm") || str.endsWith("p")) { ampm = "pm"; str = str.replace(/(pm|p)$/, ""); }
const parts = str.split(/[:.]/);
let h = parseInt(parts[0]);
const m = parts[1] ? parseInt(parts[1]) : 0;
if (isNaN(h)) return null;
if (ampm === "pm" && h !== 12) h += 12;
if (ampm === "am" && h === 12) h = 0;
if (ampm === null && h < 5) h += 12;
return { h, m };
}

const TSD_CHART = [
{ min: 0,   max: 24,  label: "0-1",  hours: 0   },
{ min: 24,  max: 39,  label: "1-2",  hours: 1.5 },
{ min: 39,  max: 54,  label: "2-3",  hours: 2.5 },
{ min: 54,  max: 68,  label: "3-4",  hours: 3.5 },
{ min: 68,  max: 83,  label: "4-5",  hours: 4.5 },
{ min: 83,  max: 98,  label: "5-6",  hours: 5.5 },
{ min: 98,  max: 124, label: "6-7",  hours: 6.5 },
{ min: 124, max: 154, label: "7-8",  hours: 7.5 },
{ min: 154, max: Infinity, label: "7-8+", hours: 8 },
];

function getTSDRow(t) {
return TSD_CHART.find(r => t >= r.min && t < r.max) || TSD_CHART[TSD_CHART.length - 1];
}

const SLOTS = generateSlots();

function SBLabel({ children, noBottom }) {
return <div style={{ fontSize: 9, color: SB.darkGreen, textTransform: "uppercase", letterSpacing: "0.18em", fontWeight: 700, marginBottom: noBottom ? 0 : 7 }}>{children}</div>;
}
function STH({ children, white, green }) {
return <div style={{ fontSize: 9, color: white ? SB.white : green ? SB.darkGreen : SB.gray, textTransform: "uppercase", letterSpacing: "0.1em", padding: "8px 10px", fontWeight: 700 }}>{children}</div>;
}
function SBPill({ label, value, color }) {
return (
<div style={{ background: SB.white, border: "1px solid #ddd", borderRadius: 8, padding: "7px 10px", flex: 1, textAlign: "center" }}>
<div style={{ fontSize: 8, color: SB.gray, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 3 }}>{label}</div>
<div style={{ fontSize: 13, fontWeight: 700, color }}>{value}</div>
</div>
);
}
function SBCalcRow({ label, value, color }) {
return (
<div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #f0f0f0" }}>
<span style={{ fontSize: 11, color: SB.gray }}>{label}</span>
<span style={{ fontSize: 12, fontWeight: 600, color: color || SB.black }}>{value}</span>
</div>
);
}
function SheetStat({ label, value }) {
return (
<div>
<div style={{ fontSize: 8, color: SB.lightGreen, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: 2 }}>{label}</div>
<div style={{ fontSize: 13, fontWeight: 700, color: SB.white }}>{value}</div>
</div>
);
}

function App() {
const [view, setView] = React.useState("manager");
const [planned, setPlanned] = React.useState("");
const [scheduled, setScheduled] = React.useState("");
const [dayLabel, setDayLabel] = React.useState("");
const [projectedDailyTSD, setProjectedDailyTSD] = React.useState("");
const [windows, setWindows] = React.useState([{ start: "", end: "" }]);
const [projectedTSD, setProjectedTSD] = React.useState(Array(SLOTS.length).fill(""));
const [actualTSD, setActualTSD] = React.useState(Array(SLOTS.length).fill(""));
const [published, setPublished] = React.useState(false);
const [exporting, setExporting] = React.useState(false);
const [checkInTimes, setCheckInTimes] = React.useState(["Before Peak", "After Peak", "2:00 PM", "4:00 PM"]);

const plannedN   = parseFloat(planned) || 0;
const scheduledN = parseFloat(scheduled) || 0;
const extraHours = Math.max(0, scheduledN - plannedN);
const dailyTSD   = parseFloat(projectedDailyTSD) || 0;
const insideAdj  = extraHours > 0 && dailyTSD > 0 ? (dailyTSD / 2) / extraHours : 0;

const parsedWindows = React.useMemo(() =>
windows.map(w => {
const s = parseTimeInput(w.start);
const e = parseTimeInput(w.end);
return s && e ? { sh: s.h, sm: s.m, eh: e.h, em: e.m } : null;
}).filter(Boolean), [windows]);

const firstWindowStart = parsedWindows.length > 0 ? Math.min(...parsedWindows.map(w => timeToDecimal(w.sh, w.sm))) : null;
const lastWindowEnd    = parsedWindows.length > 0 ? Math.max(...parsedWindows.map(w => timeToDecimal(w.eh, w.em))) : null;

function getSlotZone(slot) {
const t = timeToDecimal(slot.hour, slot.min);
if (firstWindowStart === null) return "none";
if (t < firstWindowStart) return "before";
if (parsedWindows.some(w => t >= timeToDecimal(w.sh, w.sm) && t <= timeToDecimal(w.eh, w.em))) return "inside";
return "carry";
}

const insideSlotCount = React.useMemo(() => SLOTS.filter(s => getSlotZone(s) === "inside").length, [parsedWindows]);
const betweenSlotCount = React.useMemo(() => SLOTS.filter(s => {
const t = timeToDecimal(s.hour, s.min);
if (!firstWindowStart || !lastWindowEnd) return false;
return t > firstWindowStart && t < lastWindowEnd && getSlotZone(s) === "carry";
}).length, [parsedWindows]);

const totalEarnedAdj = insideAdj * insideSlotCount;
const betweenAdj = (insideSlotCount + betweenSlotCount) > 0 ? totalEarnedAdj / (insideSlotCount + betweenSlotCount) : 0;

const slotAdjustments = React.useMemo(() => {
let cumulative = 0;
return SLOTS.map(slot => {
const zone = getSlotZone(slot);
const t = timeToDecimal(slot.hour, slot.min);
if (zone === "before" || zone === "none") return 0;
if (zone === "inside") { cumulative += insideAdj; return cumulative; }
if (zone === "carry") {
if (lastWindowEnd !== null && t <= lastWindowEnd) { cumulative += betweenAdj; return cumulative; }
return totalEarnedAdj;
}
return 0;
});
}, [parsedWindows, insideAdj, totalEarnedAdj, betweenAdj]);

const targets = React.useMemo(() =>
SLOTS.map((slot, i) => {
const base = parseFloat(projectedTSD[i]);
if (isNaN(base) || projectedTSD[i] === "") return null;
return Math.round(base + slotAdjustments[i]);
}), [projectedTSD, slotAdjustments]);

const hasTargets = targets.some(t => t !== null);
const windowDebug = parsedWindows.map(w => fmtTime(w.sh, w.sm) + "-" + fmtTime(w.eh, w.em)).join(", ");

const updateProjected = (i, val) => setProjectedTSD(prev => { const n = [...prev]; n[i] = val; return n; });
const updateActual    = (i, val) => setActualTSD(prev => { const n = [...prev]; n[i] = val; return n; });
const addWindow    = () => setWindows(prev => [...prev, { start: "", end: "" }]);
const removeWindow = (i) => setWindows(prev => prev.filter((_, idx) => idx !== i));
const updateWindow = (i, field, val) => setWindows(prev => { const n = [...prev]; n[i] = { ...n[i], [field]: val }; return n; });

const handlePaste = (e) => {
const raw = e.target.value;
const cleaned = raw.replace(/running total/i, "").trim();
const nums = cleaned.split(/[\t,\s]+/).map(v => v.trim()).filter(v => v !== "" && !isNaN(v));
if (nums.length > 0) {
setProjectedTSD(prev => {
const next = [...prev];
nums.forEach((n, i) => { if (i < next.length) next[i] = n; });
return next;
});
}
};

const lastActualIdx  = React.useMemo(() => actualTSD.reduce((acc, v, i) => v !== "" ? i : acc, -1), [actualTSD]);
const currentActual  = lastActualIdx >= 0 ? (parseFloat(actualTSD[lastActualIdx]) || 0) : null;
const currentTarget  = lastActualIdx >= 0 ? targets[lastActualIdx] : null;
const gap            = currentActual !== null && currentTarget !== null ? currentActual - currentTarget : null;
const tsdRowActual   = currentActual !== null ? getTSDRow(currentActual) : null;
const justifiedHours = tsdRowActual ? tsdRowActual.hours : 0;
const hoursToCut     = Math.max(0, extraHours - justifiedHours);

const paceStatus = gap === null ? "neutral" : gap >= 0 ? "good" : gap >= -10 ? "close" : "behind";
const paceMap = {
neutral: { color: SB.gray,   bg: SB.lightGray, border: "#ccc",     label: "Enter actuals to track" },
good:    { color: SB.green,  bg: "#e6f4ee",    border: SB.green,   label: "On Pace - Keep the crew!" },
close:   { color: SB.gold,   bg: "#fdf5e6",    border: SB.gold,    label: "Close - Watch It" },
behind:  { color: "#c0392b", bg: "#fde8e6",    border: "#c0392b",  label: "Behind - Cut Hours" },
};
const pace = paceMap[paceStatus];

function zoneColor(zone) {
if (zone === "inside") return SB.green;
if (zone === "carry") return SB.gold;
return SB.gray;
}

const inp = {
display: "block", width: "100%", boxSizing: "border-box",
background: SB.white, border: "1px solid #ccc", borderRadius: 8,
color: SB.black, fontFamily: "Georgia, serif", fontSize: 15,
padding: "10px 12px", outline: "none",
};
const inlineInp = {
display: "block", width: "100%", boxSizing: "border-box",
background: "transparent", border: "none", borderBottom: "1px solid #ccc",
color: SB.black, fontFamily: "Georgia, serif", fontSize: 14,
padding: "3px 4px", outline: "none",
};

const TABS = [["manager", "Setup"], ["screenshot", "Sheet"], ["ssv", "SSV"]];

return (
<div style={{ minHeight: "100vh", background: SB.cream, color: SB.black, fontFamily: "Georgia, serif" }}>

```
  {/* Header */}

    <div style={{ width: 36, height: 36, borderRadius: "50%", background: SB.green, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, border: "2px solid rgba(255,255,255,0.3)" }}>☕</div>
    <div>
      <div style={{ fontSize: 10, letterSpacing: "0.2em", color: SB.lightGreen, textTransform: "uppercase", marginBottom: 2 }}>Starbucks Labor</div>
      <div style={{ fontSize: 20, fontWeight: 700, color: SB.white }}>TSD Target Tracker</div>

  <div style={{ maxWidth: 520, margin: "0 auto", padding: "18px 14px 60px" }}>

    {view === "manager" && (
      <div className="no-print">
        <SBLabel>Day / Date</SBLabel>

          </div>
        </div>

        <SBLabel>Projected Daily TSD</SBLabel>
        <input type="number" inputMode="numeric" placeholder="e.g. 594" value={projectedDailyTSD} onChange={e => setProjectedDailyTSD(e.target.value)} style={{ ...inp, marginBottom: 14 }} />

        {plannedN > 0 && scheduledN > 0 && dailyTSD > 0 && (
          <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
            <SBPill label="Extra Hrs" value={"+" + extraHours.toFixed(2)} color={SB.gold} />
            <SBPill label="Adj/slot" value={"+" + insideAdj.toFixed(1)} color={SB.green} />

          </div>
        )}

        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>

          </div>
          <div style={{ fontSize: 10, color: SB.gray, marginBottom: 8 }}>Format: 6:45a, 10:15a, 11a, 12:45p</div>
          {windows.map((w, i) => (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>

              <span style={{ color: SB.gray, fontSize: 12 }}>to</span>

              {windows.length > 1 && (
                <button onClick={() => removeWindow(i)} style={{ color: "#c0392b", background: "transparent", border: "none", cursor: "pointer", fontSize: 18, padding: "0 4px" }}>x</button>
              )}
            </div>
          ))}
          {windowDebug ? <div style={{ fontSize: 10, color: SB.green, marginTop: 4 }}>Parsed: {windowDebug}</div> : null}
        </div>

        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <SBLabel noBottom>SSV Check-In Times</SBLabel>
            <button onClick={() => setCheckInTimes(prev => [...prev, "])} style={{ fontSize: 11, color: SB.green, background: "transparent", border: "1px solid " + SB.green, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontFamily: "Georgia, serif" }}>+ Add</button>
          </div>

                {checkInTimes.length > 1 && (

                )}
              </div>

          </div>

        <div style={{ fontSize: 10, color: SB.gray, marginBottom: 14 }}>Copy the Running Total row and paste - slots fill automatically</div>

        <SBLabel>System Projected TSD - per half-hour</SBLabel>
        <div style={{ background: SB.white, border: "1px solid #ccc", borderRadius: 12, overflow: "hidden", marginBottom: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "85px 14px 1fr 95px", borderBottom: "1px solid #e0e0e0", background: SB.lightGreen }}>
            <STH>Time</STH><STH></STH><STH>System TSD</STH><STH green>Target</STH>

          <div style={{ maxHeight: 340, overflowY: "auto" }}>
            {SLOTS.map((slot, i) => {

              const hasVal = projectedTSD[i] !== ";
              const adj    = slotAdjustments[i];
              return (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "85px 14px 1fr 95px", borderBottom: "1px solid #f0f0f0", background: zone === "inside" ? "#e8f5ee" : zone === "carry" ? "#fdf8ee" : SB.white }}>

                  <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>

                    <input type="number" inputMode="numeric" placeholder="-" value={projectedTSD[i]} onChange={e => updateProjected(i, e.target.value)} style={inlineInp} />

                  <div style={{ padding: "7px 10px", display: "flex", alignItems: "center", gap: 4 }}>
                    <span style={{ fontSize: 15, fontWeight: 700, color: target !== null ? zoneColor(zone) : "#ddd" }}>{target !== null ? target : "-"}</span>
                    {target !== null && adj > 0 && <span style={{ fontSize: 9, color: SB.gray }}>+{Math.round(adj)}</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {hasTargets && (
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { setPublished(true); setView("screenshot"); }} style={{ flex: 2, padding: "14px", borderRadius: 10, border: "none", background: SB.green, color: SB.white, fontFamily: "Georgia, serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
              Publish and View Sheet
            </button>
          </div>
        )}
      </div>
    )}

    {/* SHEET TAB */}
    {view === "screenshot" && (
      <div>
        {!hasTargets ? (
          <div style={{ textAlign: "center", padding: "40px 20px", color: SB.gray, fontSize: 13 }}>Complete Setup first.</div>
        ) : (
          <div>
            <div style={{ background: SB.white, borderRadius: 16, overflow: "hidden", border: "1px solid #ddd" }}>
              <div style={{ background: SB.darkGreen, padding: "16px 20px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: "50%", background: SB.green, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, border: "2px solid rgba(255,255,255,0.3)" }}>☕</div>
                  <div>
                    <div style={{ fontSize: 9, color: SB.lightGreen, textTransform: "uppercase", letterSpacing: "0.15em" }}>TSD Target Sheet</div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: SB.white }}>{dayLabel || "Today"}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap", marginBottom: 12 }}>
                  <SheetStat label="Extra Hrs" value={"+" + extraHours.toFixed(2)} />
                  <SheetStat label="New Daily TSD" value={Math.round(dailyTSD + totalEarnedAdj)} />
                  <SheetStat label="Adj/slot" value={"+" + insideAdj.toFixed(1)} />
                  {parsedWindows.map((w, i) => (
                    <SheetStat key={i} label={"Window " + (i + 1)} value={fmtTime(w.sh, w.sm) + " - " + fmtTime(w.eh, w.em)} />
                  ))}
                </div>
                {checkInTimes.filter(t => t.trim()).length > 0 && (
                  <div style={{ borderTop: "1px solid rgba(255,255,255,0.2)", paddingTop: 10 }}>
                    <div style={{ fontSize: 8, color: SB.lightGreen, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 6 }}>SSV Check-In Times</div>
                    <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                      {checkInTimes.filter(t => t.trim()).map((t, i) => (
                        <div key={i} style={{ background: "rgba(255,255,255,0.15)", borderRadius: 6, padding: "4px 10px", fontSize: 12, color: SB.white, fontWeight: 700 }}>{t}</div>
                      ))}
                    </div>
                  </div>
                )}
              </div>

              <div style={{ background: SB.lightGreen, padding: "8px 16px", display: "flex", gap: 16, fontSize: 10, color: SB.darkGreen }}>
                <span><b style={{ color: SB.green }}>Green</b> = extra labor window</span>
                <span><b style={{ color: SB.gold }}>Gold</b> = elevated carry</span>
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "90px 14px 1fr 90px", background: SB.green }}>
                <STH white>Time</STH><STH white></STH><STH white>Target TSD</STH><STH white>Actual</STH>
              </div>

              {SLOTS.map((slot, i) => {
                const target = targets[i];
                if (target === null) return null;
                const zone  = getSlotZone(slot);
                const adj   = slotAdjustments[i];
                const isEven = i % 2 === 0;
                return (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "90px 14px 1fr 90px", borderBottom: "1px solid #f0f0f0", background: zone === "inside" ? "#e8f5ee" : zone === "carry" ? "#fdf8ee" : isEven ? SB.white : SB.cream }}>
                    <div style={{ padding: "9px 12px", fontSize: 12, fontWeight: zone === "inside" ? 700 : 400, color: SB.black, display: "flex", alignItems: "center" }}>{fmtTime(slot.hour, slot.min)}</div>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {adj > 0 && <div style={{ width: 6, height: 6, borderRadius: "50%", background: zoneColor(zone) }}></div>}
                    </div>
                    <div style={{ padding: "9px 12px", display: "flex", alignItems: "center", gap: 6 }}>
                      <span style={{ fontSize: 20, fontWeight: 700, color: zoneColor(zone) }}>{target}</span>
                      {adj > 0 && <span style={{ fontSize: 9, color: SB.gray }}>+{Math.round(adj)}</span>}
                    </div>
                    <div style={{ padding: "9px 12px", display: "flex", alignItems: "center" }}>
                      <div style={{ width: "80%", borderBottom: "1.5px solid #bbb", height: 22 }}></div>
                    </div>
                  </div>
                );
              })}

              <div style={{ background: SB.darkGreen, padding: "10px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 10, color: SB.lightGreen }}>Planned {plannedN.toFixed(2)} - Scheduled {scheduledN.toFixed(2)}</div>
                <div style={{ fontSize: 16 }}>☕</div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 14 }} className="no-print">
              <button onClick={() => window.print()} style={{ flex: 1, padding: "13px", borderRadius: 10, border: "none", background: SB.green, color: SB.white, fontFamily: "Georgia, serif", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
                🖨 Print / Save as PDF
              </button>
            </div>
            <div style={{ fontSize: 10, color: SB.gray, textAlign: "center", marginTop: 6 }} className="no-print">
              In print dialog choose "Save as PDF"
            </div>
          </div>
        )}
      </div>
    )}

    {/* SSV TAB */}
    {view === "ssv" && (
      <div className="no-print">
        {!published || !hasTargets ? (
          <div style={{ textAlign: "center", padding: "40px 20px", color: SB.gray, fontSize: 13 }}>Complete Setup first.</div>
        ) : (
          <div>
            <div style={{ background: pace.bg, border: "2px solid " + pace.border, borderRadius: 12, padding: "14px 18px", marginBottom: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 700, color: pace.color, marginBottom: 4 }}>{pace.label}</div>
                {gap !== null && <div style={{ fontSize: 11, color: SB.gray }}>Actual {currentActual} vs target {currentTarget} ({gap >= 0 ? "+" : "}{gap})</div>}
              </div>
              {gap !== null && gap < 0 && (
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 9, color: SB.gray, marginBottom: 2 }}>CUT</div>
                  <div style={{ fontSize: 32, fontWeight: 700, color: pace.color, lineHeight: 1 }}>{hoursToCut.toFixed(1)}</div>
                  <div style={{ fontSize: 9, color: SB.gray }}>hrs</div>
                </div>
              )}
            </div>

            <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
              <SBPill label="Day" value={dayLabel || "-"} color={SB.darkGreen} />
              <SBPill label="Extra Hrs" value={"+" + extraHours.toFixed(2)} color={SB.gold} />
              <SBPill label="Earned TSD" value={"+" + Math.round(totalEarnedAdj)} color={SB.green} />
            </div>

            <div style={{ background: SB.white, border: "1px solid #ddd", borderRadius: 12, overflow: "hidden", marginBottom: 14 }}>
              <div style={{ display: "grid", gridTemplateColumns: "80px 14px 70px 1fr 55px", background: SB.green }}>
                <STH white>Time</STH><STH white></STH><STH white>Target</STH><STH white>Actual</STH><STH white>+/-</STH>
              </div>
              <div style={{ maxHeight: 420, overflowY: "auto" }}>
                {SLOTS.map((slot, i) => {
                  const target  = targets[i];
                  if (target === null) return null;
                  const zone    = getSlotZone(slot);
                  const actual  = parseFloat(actualTSD[i]);
                  const hasAct  = actualTSD[i] !== " && !isNaN(actual);
                  const diff    = hasAct ? actual - target : null;
                  const isLast  = i === lastActualIdx;
                  return (
                    <div key={i} style={{ display: "grid", gridTemplateColumns: "80px 14px 70px 1fr 55px", borderBottom: "1px solid #f0f0f0", background: isLast ? SB.lightGreen : zone === "inside" ? "#e8f5ee" : SB.white }}>
                      <div style={{ padding: "7px 8px", fontSize: 10, color: isLast ? SB.darkGreen : SB.gray, display: "flex", alignItems: "center" }}>{fmtTime(slot.hour, slot.min)}</div>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {slotAdjustments[i] > 0 && <div style={{ width: 5, height: 5, borderRadius: "50%", background: zoneColor(zone) }}></div>}
                      </div>
                      <div style={{ padding: "7px 8px", fontSize: 15, fontWeight: 700, color: zoneColor(zone), display: "flex", alignItems: "center" }}>{target}</div>
                      <div style={{ padding: "5px 6px", display: "flex", alignItems: "center" }}>
                        <input type="number" inputMode="numeric" placeholder="enter" value={actualTSD[i]} onChange={e => updateActual(i, e.target.value)} style={inlineInp} />
                      </div>
                      <div style={{ padding: "7px 6px", fontSize: 13, fontWeight: 700, display: "flex", alignItems: "center", color: diff === null ? "#ccc" : diff >= 0 ? SB.green : "#c0392b" }}>
                        {diff === null ? "-" : (diff >= 0 ? "+" : ") + diff}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {lastActualIdx >= 0 && (
              <div style={{ background: SB.white, border: "2px solid " + (hoursToCut > 0 ? "#c0392b" : SB.green), borderRadius: 12, padding: 16 }}>
                <div style={{ fontSize: 9, color: SB.gray, textTransform: "uppercase", letterSpacing: "0.15em", marginBottom: 10 }}>Cut Calculation</div>
                <SBCalcRow label="Extra hours scheduled" value={"+" + extraHours.toFixed(2) + " hrs"} color={SB.gold} />
                <SBCalcRow label={"TSD at " + fmtTime(SLOTS[lastActualIdx].hour, SLOTS[lastActualIdx].min)} value={currentActual + " transactions"} />
                <SBCalcRow label="Hours justified (TSD chart)" value={(tsdRowActual ? tsdRowActual.label : "-") + " hrs = " + justifiedHours + " hrs"} color={SB.green} />
                <div style={{ borderTop: "1px solid #eee", marginTop: 10, paddingTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 12, color: SB.gray }}>Hours to cut</span>
                  <span style={{ fontSize: 26, fontWeight: 700, color: hoursToCut > 0 ? "#c0392b" : SB.green }}>
                    {hoursToCut > 0 ? hoursToCut.toFixed(2) + " hrs" : "Keep all staff"}
                  </span>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    )}
  </div>
</div>
```

);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
